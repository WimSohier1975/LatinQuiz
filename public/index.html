<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Quiz Perfect Mix</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        header { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        header h1 { margin: 0; font-size: 1.8rem; letter-spacing: 1px; }
        header p { margin: 5px 0 0 0; opacity: 0.7; font-size: 0.9rem; }

        #start-scherm button { margin-top: 0; }

        #quiz-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.9rem; color: #666; font-weight: bold; }
        .vraag-header { position: relative; margin-bottom: 15px; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        
        .tip-btn { position: absolute; right: 0; background: #f1c40f; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; min-width: 35px; min-height: 35px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; cursor: pointer; line-height: 0; padding: 0; margin: 0; }
        #tip-tekst { display: none; font-size: 0.85rem; font-style: italic; color: #7f8c8d; margin: 10px 0 20px 0; padding: 10px; background: #fff9e6; border-radius: 5px; border-left: 4px solid #f1c40f; text-align: left; }
        
        #antwoorden { display: grid; gap: 10px; margin: 20px 0; }
        button { padding: 12px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; min-height: 50px; }
        button:hover:not(.no-click):not(:disabled) { background: var(--primary); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; border-color: #ccc; color: #ccc; }
        
        .correct-flash { background-color: var(--success) !important; color: white !important; border-color: #27ae60 !important; }
        .wrong-flash { background-color: var(--danger) !important; color: white !important; border-color: #c0392b !important; }
        .no-click { pointer-events: none; }
        
        #open-vraag-container { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 10px; border: 1px dashed #ccc; text-align: left; }
        input[type="text"] { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        
        .icon-btn { width: 60px; font-size: 1.2rem; color: white; border: none; margin-top: 10px; cursor: pointer; }
        .stop-btn { background: #95a5a6; color: white; border: none; margin-top: 15px; font-size: 0.8rem; width: auto; padding: 8px 20px; }
        
        footer { margin-top: auto; padding: 20px; font-size: 0.8rem; color: #888; text-align: center; }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: white;
            height: 42px;
        }
        label {
            display: block;
            margin-bottom: 4px;
            color: #444;
        }
    </style>
</head>
<body>

<header>
    <h1>Multi-Quiz Perfect Mix</h1>
    <p>Oefen je woorden en vertalingen</p>
</header>

<div id="quiz-container">
    <!-- START SCHERM -->
    <div id="start-scherm">
        <h2>Kies een quiz</h2>
        <select id="quiz-selectie" style="padding:10px; width:100%; margin-bottom:20px; border-radius:8px; border:1px solid #ddd;"></select>
        <button onclick="startQuiz()">Start de quiz</button>
        
        <!-- NIEUW: Quiz Admin Kader -->
        <div style="margin-top: 30px; padding: 15px; border: 1px solid #ccc; border-radius: 10px; position: relative;">
            <span style="position: absolute; top: -12px; left: 15px; background: white; padding: 0 10px; font-size: 0.85rem; font-weight: bold; color: #7f8c8d;">Quiz Admin</span>
            
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <button onclick="toggleAdmin()" style="background: #95a5a6; border-color: #95a5a6; color: white; margin: 0; flex: 1;">+ Nieuwe quiz</button>
                <button onclick="toggleDelete()" style="background: #e74c3c; border-color: #e74c3c; color: white; margin: 0; flex: 1;">- Verwijder quiz</button>
            </div>
        </div>
    </div>

    <!-- ADMIN GEDEELTE -->
    <div id="admin-paneel" style="display:none; margin-top: 20px; text-align: left; padding: 15px; background: #eef2f3; border-radius: 8px; border: 1px solid #ccc;">
        <h3 style="margin-top:0">Nieuwe Quiz</h3>
        
        <!-- Naam veld (volledige breedte) -->
        <label style="font-size: 0.85rem; font-weight: bold;">Naam van de quiz:</label>
        <input type="text" id="new-naam" placeholder="Bijv. Proefwerk Hoofdstuk 1" style="margin-bottom: 15px;">
        
        <!-- Taal en Boek naast elkaar -->
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div style="flex:1">
                <label style="font-size: 0.85rem; font-weight: bold;">Taal:</label>
                <select id="new-taal" onchange="updateBoeken()"></select>
            </div>
            <div style="flex:1">
                <label style="font-size: 0.85rem; font-weight: bold;">Boek:</label>
                <select id="new-boek" onchange="updateHoofdstukken()"></select>
            </div>
        </div>

        <!-- Hoofdstuk (volledige breedte) -->
        <div style="margin-bottom: 15px;">
            <label style="font-size: 0.85rem; font-weight: bold;">Hoofdstuk (optioneel):</label>
            <select id="new-hoofdstuk" onchange="updateVolgnummers()">
                <option value="">-- Gebruik volgnummers --</option>
            </select>
        </div>
        
        <!-- Vanaf en Tot naast elkaar -->
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div style="flex:1">
                <label style="font-size: 0.85rem; font-weight: bold;">Vanaf nr:</label>
                <select id="new-vanaf"></select>
            </div>
            <div style="flex:1">
                <label style="font-size: 0.85rem; font-weight: bold;">Tot nr:</label>
                <select id="new-tot"></select>
            </div>
        </div>

        <div id="admin-error" style="display:none; color: var(--danger); background: #fdeaea; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.85rem; border: 1px solid var(--danger);"></div>
        
        <div style="display: flex; gap: 10px;">
            <button onclick="saveQuiz()" style="background: var(--success); color: white; border: none; flex: 2;">Opslaan</button>
            <button onclick="toggleAdmin()" style="background: #e74c3c; color: white; border: none; flex: 1;">Annuleren</button>
        </div>
    </div>

    <!-- ADMIN VERWIJDER GEDEELTE -->
    <div id="delete-paneel" style="display:none; margin-top: 20px; text-align: left; padding: 15px; background: #fdf2f2; border-radius: 8px; border: 1px solid #fab1a0;">
        <h3 style="margin-top:0; color: #d63031;">Quiz Verwijderen</h3>
        <p style="font-size: 0.8rem; margin-bottom: 10px;">Selecteer een tijdelijke quiz om te wissen:</p>
        <select id="delete-selectie" style="margin-bottom: 15px; border-color: #fab1a0;"></select>
        
        <div id="delete-error" style="display:none; color: var(--danger); background: #fff; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.85rem; border: 1px solid var(--danger);"></div>
        
        <div style="display: flex; gap: 10px;">
            <button id="confirm-delete-btn" onclick="deleteQuiz()" style="background: var(--danger); color: white; border: none; flex: 2;">Definitief Wissen</button>
            <button onclick="toggleDelete()" style="background: #95a5a6; color: white; border: none; flex: 1;">Annuleren</button>
        </div>
    </div>

    <!-- QUIZ GEDEELTE -->
    <div id="quiz-gedeelte" style="display:none;">
        <div class="stats">
            <span id="progress"></span>
            <span id="live-perc"></span>
        </div>
        <div class="vraag-header">
            <h2 id="vraag-tekst" style="width: 80%; margin: 0; font-size: 1.2rem;"></h2>
            <button id="tip-btn" class="tip-btn" onclick="toonTip()">?</button>
        </div>
        <div id="tip-tekst"></div>
        
        <div id="antwoorden"></div>

        <div id="open-vraag-container">
            <p style="font-size: 0.8rem; color: #666; margin: 0 0 5px 0;">Middenkolom (grammatica):</p>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="open-input" placeholder="Typ hier..." onkeypress="if(event.key === 'Enter') checkOpenAntwoord()">
                <button id="open-check-btn" onclick="checkOpenAntwoord()" style="width: auto;" disabled>Check</button>
            </div>

            <div id="open-beoordeling" style="display:none; margin-top: 15px;">
                <p style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">Correcte middenkolom:</p>
                <input type="text" id="open-correct-display" readonly style="border-color: var(--success); background: #e8f8f0; color: #27ae60; font-weight: bold;">
                <p style="font-size: 0.8rem; color: #666; margin-top:10px;">Was je eigen antwoord goed?</p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="icon-btn" onclick="beoordeelOpen(true)" style="background: var(--success);">✓</button>
                    <button class="icon-btn" onclick="beoordeelOpen(false)" style="background: var(--danger);">✕</button>
                </div>
            </div>
        </div>
        <button class="stop-btn" onclick="stopQuiz()">Stop de quiz</button>
    </div>

    <!-- RESULTAAT SCHERM -->
    <div id="resultaat-scherm" style="display:none;">
        <h3 id="resultaat-titel"></h3>
        <h2>Quiz Voltooid!</h2>
        <h1 id="eind-score"></h1>
        <p id="eind-percentage"></p>
        <button onclick="stopQuiz()">Nog een quiz</button>
    </div>
</div>

<footer>
    <span id="copyright-tekst"></span>
</footer>

<script>
let vragen = [], huidigeVraag = 0, score = 0, mcBeantwoord = false;
let alleWoordenData = []; 

// Zet het jaartal in de footer
document.getElementById('copyright-tekst').innerHTML = `&copy; ${new Date().getFullYear()} Multi-Quiz Perfect Mix - Alle rechten voorbehouden aan So Be IT Services`;

// 1. Initialisatie: Quizlijst en Opties ophalen
async function init() {
    try {
        // Laad bestaande quiznamen voor de start-dropdown
        const qRes = await fetch('/api/quizzen');
        const quizzen = await qRes.json();
        const select = document.getElementById('quiz-selectie');
        quizzen.forEach(naam => {
            select.add(new Option(naam, naam));
        });

        // Laad alle data uit woorden.xlsx voor de admin-dropdowns
        const oRes = await fetch('/api/opties');
        alleWoordenData = await oRes.json();
        vulAdminDropdowns();
    } catch (e) {
        console.error("Fout bij laden data:", e);
    }
}

// 2. Admin Functies: Vul de dropdowns dynamisch
// Wordt aangeroepen zodra de data geladen is
function vulAdminDropdowns() {
    const talen = [...new Set(alleWoordenData.map(w => w.taal))].filter(Boolean).sort();
    const taalSelect = document.getElementById('new-taal');
    
    taalSelect.innerHTML = ''; // Maak leeg
    talen.forEach(t => taalSelect.add(new Option(t, t)));
    
    // Trigger de kettingreactie
    updateBoeken();
}

// 1. Update boeken op basis van gekozen taal
function updateBoeken() {
    const taal = document.getElementById('new-taal').value;
    const subset = alleWoordenData.filter(w => w.taal === taal);
    const boeken = [...new Set(subset.map(w => w.boek))].filter(Boolean).sort();
    
    const boekSelect = document.getElementById('new-boek');
    boekSelect.innerHTML = '';
    boeken.forEach(b => boekSelect.add(new Option(b, b)));
    
    updateHoofdstukken();
}

// 2. Update hoofdstukken op basis van taal + boek
function updateHoofdstukken() {
    const taal = document.getElementById('new-taal').value;
    const boek = document.getElementById('new-boek').value;
    const subset = alleWoordenData.filter(w => w.taal === taal && w.boek === boek);
    
    const hfstSelect = document.getElementById('new-hoofdstuk');
    hfstSelect.innerHTML = '<option value="">-- Gebruik volgnummers --</option>';
    
    const hoofdstukken = [...new Set(subset.map(w => w.hoofdstuk))].filter(Boolean).sort();
    hoofdstukken.forEach(h => hfstSelect.add(new Option(h, h)));
    
    updateVolgnummers();
}

// 3. Update volgnummers op basis van taal + boek + hoofdstuk
function updateVolgnummers() {
    const taal = document.getElementById('new-taal').value;
    const boek = document.getElementById('new-boek').value;
    const hfst = document.getElementById('new-hoofdstuk').value;
    
    // We starten met de basis set (taal + boek)
    let subset = alleWoordenData.filter(w => 
        String(w.taal) === taal && 
        String(w.boek) === boek
    );
    
    // BELANGRIJK: Als er een hoofdstuk gekozen is, filter de nummers dan specifiek voor dat hoofdstuk
    if (hfst && hfst !== "") {
        subset = subset.filter(w => String(w.hoofdstuk) === hfst);
    }
    
    // Haal de nummers op, zet ze om naar Numbers en sorteer ze
    const nrs = subset
        .map(w => parseInt(w.volgnr))
        .filter(n => !isNaN(n))
        .sort((a, b) => a - b);
    
    const vSelect = document.getElementById('new-vanaf');
    const tSelect = document.getElementById('new-tot');
    
    vSelect.innerHTML = ''; 
    tSelect.innerHTML = '';
    
    if (nrs.length > 0) {
        nrs.forEach(n => {
            vSelect.add(new Option(n, n));
            tSelect.add(new Option(n, n));
        });
        // Zet 'vanaf' op de eerste en 'tot' op de laatste van de reeks
        vSelect.value = nrs[0];
        tSelect.value = nrs[nrs.length - 1];
    } else {
        vSelect.add(new Option("--", ""));
        tSelect.add(new Option("--", ""));
    }
}

function updateAdminFilters() {
    const gekozenTaal = document.getElementById('new-taal').value;
    const gekozenBoek = document.getElementById('new-boek').value;
    
    // Filter data voor hoofdstukken en volgnummers
    const subset = alleWoordenData.filter(w => w.taal === gekozenTaal && w.boek === gekozenBoek);
    
    const hfstSelect = document.getElementById('new-hoofdstuk');
    hfstSelect.innerHTML = '<option value="">-- Gebruik volgnummers --</option>';
    [...new Set(subset.map(w => w.hoofdstuk))].filter(Boolean).forEach(h => {
        hfstSelect.add(new Option(h, h));
    });

    const vSelect = document.getElementById('new-vanaf');
    const tSelect = document.getElementById('new-tot');
    vSelect.innerHTML = ''; tSelect.innerHTML = '';
    
    const nrs = subset.map(w => Number(w.volgnr)).sort((a,b) => a-b);
    nrs.forEach(n => {
        vSelect.add(new Option(n, n));
        tSelect.add(new Option(n, n));
    });
    if(nrs.length > 0) tSelect.value = nrs[nrs.length - 1];
}

function toonFout(bericht) {
    const errorDiv = document.getElementById('admin-error');
    if (bericht) {
        errorDiv.innerText = bericht;
        errorDiv.style.display = 'block';
        // Scroll even naar de melding zodat de gebruiker het ziet
        errorDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else {
        errorDiv.style.display = 'none';
    }
}

async function saveQuiz() {
    // Reset de foutmelding bij elke poging
    toonFout(null);

    const naam = document.getElementById('new-naam').value.trim();
    const vanaf = parseInt(document.getElementById('new-vanaf').value);
    const tot = parseInt(document.getElementById('new-tot').value);

    // 1. Controleer naam
    if (!naam) return toonFout("Oeps! Geef je quiz eerst een naam.");

    // 2. Controleer of naam al bestaat
    const bestaandeQuizzen = Array.from(document.getElementById('quiz-selectie').options)
                                  .map(opt => opt.value.toLowerCase());
    if (bestaandeQuizzen.includes(naam.toLowerCase())) {
        return toonFout("Deze quiznaam bestaat al. Kies een andere naam.");
    }

    // 3. Controleer volgnummers
    if (!isNaN(vanaf) && !isNaN(tot) && vanaf > tot) {
        return toonFout(`Het startnummer (${vanaf}) mag niet hoger zijn dan het eindnummer (${tot}).`);
    }

    const data = {
        quiznaam: naam,
        taal: document.getElementById('new-taal').value,
        boek: document.getElementById('new-boek').value,
        hoofdstuk: document.getElementById('new-hoofdstuk').value,
        volgnrVanaf: vanaf,
        volgnrTot: tot
    };

    try {
        const res = await fetch('/api/quizzen', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        if (res.ok) {
            location.reload();
        } else {
            const errorText = await res.text();
            toonFout("Server fout: " + errorText);
        }
    } catch (e) {
        toonFout("Kon geen verbinding maken met de server.");
    }
}

// 3. Quiz Logica
async function startQuiz() {
    const naam = document.getElementById('quiz-selectie').value;
    const res = await fetch(`/api/vragen/${encodeURIComponent(naam)}`);
    if(!res.ok) return alert("Kon quiz niet laden");
    
    vragen = await res.json();
    huidigeVraag = 0; score = 0;
    document.getElementById('start-scherm').style.display = 'none';
    document.getElementById('quiz-gedeelte').style.display = 'block';
    toonVraag();
}

function toonVraag() {
    mcBeantwoord = false;
    const v = vragen[huidigeVraag];
    document.getElementById('vraag-tekst').innerText = v.vraag;
    document.getElementById('progress').innerText = `Vraag ${huidigeVraag + 1}/${vragen.length}`;
    document.getElementById('tip-tekst').innerText = v.tip || "Geen tip";
    document.getElementById('tip-tekst').style.display = 'none';

    const antwDiv = document.getElementById('antwoorden');
    antwDiv.innerHTML = '';
    v.antwoorden.forEach((tekst, index) => {
        const btn = document.createElement('button');
        btn.innerText = tekst;
        btn.onclick = () => checkMC(btn, index, v.correct);
        antwDiv.appendChild(btn);
    });

    document.getElementById('open-input').value = '';
    document.getElementById('open-input').disabled = true;
    document.getElementById('open-beoordeling').style.display = 'none';
}

function checkMC(btn, index, correctIndex) {
    if(mcBeantwoord) return;
    mcBeantwoord = true;
    
    const buttons = document.querySelectorAll('#antwoorden button');
    if(index === correctIndex) {
        btn.classList.add('correct-flash');
        document.getElementById('open-input').disabled = false;
        document.getElementById('open-check-btn').disabled = false;
        document.getElementById('open-input').focus();
    } else {
        btn.classList.add('wrong-flash');
        buttons[correctIndex].classList.add('correct-flash');
        setTimeout(volgendeVraag, 2000);
    }
}

function checkOpenAntwoord() {
    document.getElementById('open-correct-display').value = vragen[huidigeVraag].middenkolom;
    document.getElementById('open-beoordeling').style.display = 'block';
}

function beoordeelOpen(goed) {
    if(goed) score++;
    huidigeVraag++;
    if(huidigeVraag < vragen.length) toonVraag(); else toonResultaat();
}

function toonResultaat() {
    document.getElementById('quiz-gedeelte').style.display = 'none';
    document.getElementById('resultaat-scherm').style.display = 'block';
    document.getElementById('eind-score').innerText = `${score} / ${vragen.length}`;
}

function toggleAdmin() {
    const p = document.getElementById('admin-paneel');
    const s = document.getElementById('start-scherm');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
    s.style.display = s.style.display === 'none' ? 'block' : 'none';
}

function stopQuiz() {
    // Bevestiging vragen als de quiz nog bezig is
    if (huidigeVraag < vragen.length && huidigeVraag > 0) {
        if (!confirm("Weet je zeker dat je de quiz wilt stoppen? Je voortgang gaat verloren.")) {
            return;
        }
    }

    // Reset variabelen
    vragen = [];
    huidigeVraag = 0;
    score = 0;
    mcBeantwoord = false;

    // Schermen wisselen
    document.getElementById('quiz-gedeelte').style.display = 'none';
    document.getElementById('resultaat-scherm').style.display = 'none';
    document.getElementById('admin-paneel').style.display = 'none';
    document.getElementById('start-scherm').style.display = 'block';

    // Input velden leegmaken
    document.getElementById('open-input').value = '';
    document.getElementById('open-beoordeling').style.display = 'none';
}

function toonDeleteFout(bericht) {
    const errorDiv = document.getElementById('delete-error');
    if (bericht) {
        errorDiv.innerText = bericht;
        errorDiv.style.display = 'block';
    } else {
        errorDiv.style.display = 'none';
    }
}

async function toggleDelete() {
    const paneel = document.getElementById('delete-paneel');
    const start = document.getElementById('start-scherm');
    toonDeleteFout(null); // Reset fouten

    if (paneel.style.display === 'none') {
        const res = await fetch('/api/quizzen/tijdelijk');
        const tijdelijk = await res.json();
        const select = document.getElementById('delete-selectie');
        select.innerHTML = '';
        
        if (tijdelijk.length === 0) {
            // In plaats van alert, toon een melding op het startscherm of in het paneel
            alert("Er zijn geen tijdelijke quizzen om te verwijderen."); 
            return;
        }
        
        tijdelijk.forEach(n => select.add(new Option(n, n)));
        paneel.style.display = 'block';
        start.style.display = 'none';
    } else {
        paneel.style.display = 'none';
        start.style.display = 'block';
    }
}

async function deleteQuiz() {
    const select = document.getElementById('delete-selectie');
    const naam = select.value;
    const btn = document.getElementById('confirm-delete-btn');

    // Eerste klik is bevestiging vragen in de interface
    if (!btn.dataset.confirmed) {
        btn.dataset.confirmed = "true";
        btn.innerText = "Klik nogmaals om te bevestigen";
        toonDeleteFout(`Weet je zeker dat je "${naam}" wilt wissen?`);
        return;
    }

    try {
        const res = await fetch(`/api/quizzen/${encodeURIComponent(naam)}`, { method: 'DELETE' });
        if (res.ok) {
            location.reload();
        } else {
            const errorText = await res.text();
            toonDeleteFout("Fout: " + errorText);
            btn.dataset.confirmed = "";
            btn.innerText = "Definitief Wissen";
        }
    } catch (e) {
        toonDeleteFout("Server onbereikbaar.");
        btn.dataset.confirmed = "";
        btn.innerText = "Definitief Wissen";
    }
}

init();
</script>

</body>
</html>
