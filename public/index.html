<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Quiz (MC & Open)</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; margin: 20px; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.9rem; color: #666; font-weight: bold; }
        .vraag-header { 
            position: relative; 
            margin-bottom: 15px; 
            min-height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .tip-btn { 
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #f1c40f; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 35px; 
            height: 35px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            
            /* Zorgt voor exacte centrering van het vraagteken */
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 0; /* Voorkomt dat de standaard regelhoogte de tekst omlaag duwt */
        }

        #tip-tekst { 
            display: none; 
            font-size: 0.85rem; 
            font-style: italic; 
            color: #7f8c8d; 
            margin: 10px 0 20px 0; 
            padding: 10px; 
            background: #fff9e6;
            border-radius: 5px;
            border-left: 4px solid #f1c40f; 
            text-align: left;
        }
        #antwoorden { display: grid; gap: 10px; margin: 20px 0; }
        
        button { padding: 12px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; }
        button:hover:not(.no-click) { background: var(--primary); color: white; }
        
        .correct-flash { background-color: var(--success) !important; color: white !important; border-color: #27ae60 !important; }
        .wrong-flash { background-color: var(--danger) !important; color: white !important; border-color: #c0392b !important; }
        .no-click { pointer-events: none; cursor: default; }
        
        .stop-btn { background: #95a5a6; color: white; border: none; margin-top: 15px; font-size: 0.8rem; width: auto; padding: 8px 20px; }
        select { padding: 10px; width: 100%; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
        
        #open-vraag-container { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 10px; border: 1px dashed #ccc; text-align: left; }
        input[type="text"] { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .icon-btn { width: 60px; font-size: 1.2rem; color: white; border: none; }
        
        h3#resultaat-titel { color: var(--primary); margin-bottom: 5px; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-scherm">
        <h1>Kies een quiz</h1>
        <select id="quiz-selectie"></select>
        <button onclick="startQuiz()">Start de quiz</button>
    </div>

    <div id="quiz-gedeelte" style="display:none;">
        <div class="stats">
            <span id="progress"></span>
            <span id="live-perc"></span>
        </div>
        <div class="vraag-header">
            <h2 id="vraag-tekst" style="width: 80%; margin: 0;"></h2>
            <button id="tip-btn" class="tip-btn" onclick="toonTip()">?</button>
        </div>
        <div id="tip-tekst"></div>

        <!-- Eerst Multiple Choice -->
        <div id="antwoorden"></div>

        <!-- Dan Open Vraag -->
        <div id="open-vraag-container">
            <p style="font-size: 0.8rem; color: #666; margin: 0 0 5px 0;">Middenkolom:</p>
            <div id="open-input-groep" style="display: flex; gap: 5px;">
                <input type="text" id="open-input" placeholder="Typ je gedachte...">
                <button id="open-check-btn" onclick="checkOpenAntwoord()" style="width: auto;" disabled>Check</button>
            </div>
            
            <div id="open-beoordeling" style="display:none; margin-top: 15px;">
                <p style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">Correcte middenkolom:</p>
                <input type="text" id="open-correct-display" readonly style="border-color: var(--success); background: #e8f8f0; color: #27ae60; font-weight: bold;">
                
                <p style="font-size: 0.8rem; color: #666; margin: 10px 0 5px 0;">Was je eigen antwoord goed?</p>
                <div style="display: flex; gap: 10px;">
                    <button class="icon-btn" onclick="beoordeelOpen(true)" style="background: var(--success);">✓</button>
                    <button class="icon-btn" onclick="beoordeelOpen(false)" style="background: var(--danger);">✕</button>
                </div>
            </div>
        </div>

        <button class="stop-btn" onclick="stopQuiz()">Stop de quiz</button>
    </div>

    <div id="resultaat-scherm" style="display:none;">
        <h3 id="resultaat-titel"></h3>
        <h2>Quiz Voltooid!</h2>
        <h1 id="eind-score"></h1>
        <p id="eind-percentage"></p>
        <button onclick="stopQuiz()">Andere quiz</button>
    </div>
</div>

<script>
let vragen = [], huidigeVraag = 0, score = 0, mcBeantwoord = false;
let huidigeQuizNaam = "";

fetch('/api/quizzen')
    .then(res => res.json())
    .then(sheets => {
        const select = document.getElementById('quiz-selectie');
        select.innerHTML = sheets.map(s => `<option value="${s}">${s}</option>`).join('');
    });

function startQuiz() {
    huidigeQuizNaam = document.getElementById('quiz-selectie').value;
    fetch(`/api/vragen/${huidigeQuizNaam}`)
        .then(res => res.json())
        .then(data => {
            vragen = data.sort(() => Math.random() - 0.5);
            huidigeVraag = 0; score = 0;
            wisselScherm('quiz-gedeelte');
            toonVraag();
        });
}

function toonVraag() {
    const v = vragen[huidigeVraag];
    mcBeantwoord = false;
    document.getElementById('vraag-tekst').innerText = v.vraag;
    
    // Reset Tip
    const tipVak = document.getElementById('tip-tekst');
    tipVak.style.display = "none";
    tipVak.innerText = v.tip || "Geen tip beschikbaar voor deze vraag.";
    document.getElementById('tip-btn').style.visibility = v.tip ? "visible" : "hidden";

    // Reset de rest (Middenkolom en MC)
    const input = document.getElementById('open-input');
    input.value = "";
    input.disabled = false;
    const checkBtn = document.getElementById('open-check-btn');
    checkBtn.style.display = "inline-block";
    checkBtn.disabled = true; 
    document.getElementById('open-beoordeling').style.display = "none";
    document.getElementById('open-correct-display').value = "";

    updateStats();

    const div = document.getElementById('antwoorden');
    div.innerHTML = "";
    div.classList.remove('no-click');

    v.antwoorden.forEach((antwoord, index) => {
        const btn = document.createElement('button');
        btn.innerText = antwoord;
        btn.onclick = () => checkAntwoord(index);
        div.appendChild(btn);
    });
}

function toonTip() {
    const tipVak = document.getElementById('tip-tekst');
    tipVak.style.display = tipVak.style.display === "none" ? "block" : "none";
}

function checkAntwoord(gekozenIndex) {
    if (mcBeantwoord) return;
    const v = vragen[huidigeVraag];
    const knoppen = document.getElementById('antwoorden').children;
    document.getElementById('antwoorden').classList.add('no-click');
    mcBeantwoord = true;

    if (gekozenIndex === v.correct) {
        score += 0.5;
        knoppen[gekozenIndex].classList.add('correct-flash');
    } else {
        knoppen[v.correct].classList.add('correct-flash');
        knoppen[gekozenIndex].classList.add('wrong-flash');
    }
    
    // ACTIVEER DE CHECK KNOP HIER
    document.getElementById('open-check-btn').disabled = false;
    
    updateStats();
}

function checkOpenAntwoord() {
    const v = vragen[huidigeVraag];
    document.getElementById('open-input').disabled = true;
    document.getElementById('open-check-btn').style.display = "none";
    document.getElementById('open-correct-display').value = v.openAntwoord || "(Geen antwoord)";
    document.getElementById('open-beoordeling').style.display = "block";
}

function beoordeelOpen(isGoed) {
    if (isGoed) score += 0.5;
    updateStats();
    huidigeVraag++;
    huidigeVraag < vragen.length ? toonVraag() : toonResultaat();
}

function updateStats() {
    document.getElementById('progress').innerText = `Vraag ${huidigeVraag + 1}/${vragen.length}`;
    document.getElementById('live-perc').innerText = `Punten: ${score}`;
}

function toonResultaat() {
    document.getElementById('resultaat-titel').innerText = huidigeQuizNaam;
    document.getElementById('eind-score').innerText = `${score} / ${vragen.length}`;
    document.getElementById('eind-percentage').innerText = `Eindscore: ${Math.round((score/vragen.length)*100)}%`;
    wisselScherm('resultaat-scherm');
}

function stopQuiz() { wisselScherm('start-scherm'); }

function wisselScherm(id) {
    ['start-scherm', 'quiz-gedeelte', 'resultaat-scherm'].forEach(s => {
        document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
    });
}
</script>
</body>
</html>
